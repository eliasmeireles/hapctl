binds:
  # HTTP redirect (porta 80 -> 443 HTTPS)
  - name: http-redirect
    enabled: true
    override: true
    description: "Redirect HTTP port 80 to HTTPS port 443"
    type: http
    ip: "*"
    port: 80
    redirect:
      scheme: https
      port: 443
      code: 301

  # HTTPS load balancer (porta 443)
  # Note: SSL will be configured manually in HAProxy config
  - name: nginx-apps-lb-https
    enabled: true
    override: true
    description: "HTTPS load balancer for both nginx apps"
    type: http
    ip: "*"
    port: 443
    backend:
      servers:
        - name: app1-backend
          address: 127.0.0.1:8080
        - name: app2-backend
          address: 127.0.0.1:8081
