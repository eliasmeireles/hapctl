version: '3.8'

services:
  nginx-app1:
    image: nginx:alpine
    container_name: nginx-app1
    ports:
      - "8080:80"
    volumes:
      - ./html/app1:/usr/share/nginx/html:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx-app2:
    image: nginx:alpine
    container_name: nginx-app2
    ports:
      - "8081:80"
    volumes:
      - ./html/app2:/usr/share/nginx/html:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3
