version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/config:/etc/traefik/config:ro
      - ./traefik/certs:/etc/traefik/certs:ro
      - ./traefik/logs:/var/log/traefik
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  nginx-app1:
    image: nginx:alpine
    container_name: nginx-app1
    volumes:
      - ./html/app1:/usr/share/nginx/html:ro
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app1.rule=Host(`app1.localhost`) || PathPrefix(`/app1`)"
      - "traefik.http.routers.app1.entrypoints=websecure"
      - "traefik.http.routers.app1.tls=true"
      - "traefik.http.services.app1.loadbalancer.server.port=80"
      - "traefik.http.routers.app1-http.rule=Host(`app1.localhost`) || PathPrefix(`/app1`)"
      - "traefik.http.routers.app1-http.entrypoints=web"
      - "traefik.http.routers.app1-http.middlewares=redirect-to-https"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx-app2:
    image: nginx:alpine
    container_name: nginx-app2
    volumes:
      - ./html/app2:/usr/share/nginx/html:ro
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app2.rule=Host(`app2.localhost`) || PathPrefix(`/app2`)"
      - "traefik.http.routers.app2.entrypoints=websecure"
      - "traefik.http.routers.app2.tls=true"
      - "traefik.http.services.app2.loadbalancer.server.port=80"
      - "traefik.http.routers.app2-http.rule=Host(`app2.localhost`) || PathPrefix(`/app2`)"
      - "traefik.http.routers.app2-http.entrypoints=web"
      - "traefik.http.routers.app2-http.middlewares=redirect-to-https"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  traefik-network:
    driver: bridge
