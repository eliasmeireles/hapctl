<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App 4 - Grupo 02</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 { font-size: 3em; margin: 0; }
        p { font-size: 1.2em; margin-top: 20px; }
        .badge { 
            background: #E91E63; 
            padding: 10px 20px; 
            border-radius: 25px; 
            display: inline-block;
            margin-top: 20px;
        }
        .group {
            background: #C2185B;
            padding: 8px 16px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 10px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 Application 4</h1>
        <p>Served by Traefik Load Balancer</p>
        <div class="badge">Backend Server: nginx-app4 (Port 8084)</div>
        <div class="group">Grupo: grup-02.internal.network</div>
    </div>
</body>
</html>
