name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run tests
      run: go test -v ./...

    - name: Build binaries
      run: |
        GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o bin/hapctl-linux-amd64 ./cmd/hapctl
        GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o bin/hapctl-linux-arm64 ./cmd/hapctl
        GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o bin/hapctl-darwin-amd64 ./cmd/hapctl
        GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o bin/hapctl-darwin-arm64 ./cmd/hapctl

    - name: Create checksums
      run: |
        cd bin
        sha256sum hapctl-* > checksums.txt
        cat checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          bin/hapctl-linux-amd64
          bin/hapctl-linux-arm64
          bin/hapctl-darwin-amd64
          bin/hapctl-darwin-arm64
          bin/checksums.txt
        draft: false
        prerelease: false
        generate_release_notes: true
