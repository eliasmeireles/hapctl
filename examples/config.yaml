# hapctl Agent Configuration
# This is the main configuration file for the hapctl agent
# Default location: /etc/hapctl/config.yaml

# ============================================================================
# SYNC CONFIGURATION
# Automatic synchronization of HAProxy configurations from YAML files
# ============================================================================
sync:
  resource-path: /etc/hapctl/resources  # Directory containing bind YAML files
  interval: 5s                          # How often to check for changes (minimum: 1s)
  enabled: true                         # Enable automatic sync (true/false)

# ============================================================================
# MONITORING CONFIGURATION
# Health monitoring and webhook notifications for configured binds
# ============================================================================
monitoring:
  enabled: true                         # Enable health monitoring (true/false)
  interval: 10s                         # Health check interval (minimum: 1s)

  # Webhook configuration for notifications
  webhook:
    url: http://monitoring.example.com:8080/webhook  # Webhook endpoint URL
    timeout: 5s                         # Request timeout

    # Optional: Custom headers for webhook requests
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: Bearer your-secret-api-key-here
      - name: X-Service
        value: hapctl-agent

# ============================================================================
# SSL CERTIFICATE MANAGEMENT
# Automatic Let's Encrypt certificate generation and renewal
# See docs/SSL_MANAGEMENT.md for detailed documentation
# ============================================================================
ssl:
  enabled: false                        # Set to true to enable SSL management
  config-path: /etc/hapctl/ssl          # Directory for SSL domain configs
  cert-path: /etc/haproxy/certs         # Where to store HAProxy PEM files
  renewal-check: 12h                    # Check for renewal interval (twice daily)
  email: admin@example.com              # Required: Email for Let's Encrypt notifications

  # Optional: DNS provider for wildcard certificates (*.example.com)
  # Required only if you need wildcard certificates
  dns-provider: cloudflare              # Provider: cloudflare, route53, digitalocean, etc.

  # Optional: DNS provider credentials
  # Format depends on the DNS provider (see docs/SSL_MANAGEMENT.md)
  # dns-credentials:
  #   api-token: "your-cloudflare-api-token-here"
  #   # OR for older API:
  #   # email: "your-email@example.com"
  #   # api-key: "your-global-api-key"
